services:
  - type: web
    name: adplatform-backend
    env: docker
    region: frankfurt
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: adplatform-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: adplatform-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: adplatform-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://adplatform-frontend.vercel.app"

databases:
  - name: adplatform-db
    databaseName: adplatform
    user: aduser
    region: frankfurt
    plan: free
